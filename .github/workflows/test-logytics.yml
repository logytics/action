# Test workflow to verify Logytics is working
name: Test Logytics

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (will fail)
        id: test
        run: |
          # Simulate a real test failure
          node -e "
            console.log('Running tests...');
            console.log('');
            console.log('  User API');
            console.log('    ✓ should create user');
            console.log('    ✗ should connect to redis');
            console.log('');
            console.log('Error: Cannot find module \"redis\"');
            console.log('    at Function.Module._resolveFilename (node:internal/modules/cjs/loader:1048:15)');
            console.log('    at Function.Module._load (node:internal/modules/cjs/loader:901:27)');
            console.log('    at Module.require (node:internal/modules/cjs/loader:1115:19)');
            console.log('    at require (node:internal/modules/helpers:130:18)');
            console.log('    at Object.<anonymous> (/app/src/db/redis.js:1:15)');
            console.log('');
            console.log('1 passing (45ms)');
            console.log('1 failing');
            process.exit(1);
          " 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Logytics Analysis
        if: steps.test.outcome == 'failure'
        uses: logytics/action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          logs: |
            $(cat test-output.txt)

      - name: Fail workflow
        if: steps.test.outcome == 'failure'
        run: |
          echo "Test failed - see Logytics analysis in Summary"
          exit 1
