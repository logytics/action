# Test workflow to verify Logytics is working
name: Test Logytics

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linting (will fail - script does not exist)
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee output.txt

      - name: Logytics Analysis
        if: steps.lint.outcome == 'failure'
        uses: logytics/action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          logs: |
            $(cat output.txt)

      - name: Fail workflow
        if: steps.lint.outcome == 'failure'
        run: exit 1
