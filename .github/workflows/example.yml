# Example workflow showing Logytics usage
# Copy this to your repository and customize as needed

name: CI with Logytics

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        id: lint
        run: npm run lint 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Run tests
        id: test
        run: npm test 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Check for failures
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "FAILED_LOGS<<EOF" >> $GITHUB_ENV
          [ -f lint-output.txt ] && [ "${{ steps.lint.outcome }}" == "failure" ] && cat lint-output.txt >> $GITHUB_ENV
          [ -f test-output.txt ] && [ "${{ steps.test.outcome }}" == "failure" ] && cat test-output.txt >> $GITHUB_ENV
          [ -f build-output.txt ] && [ "${{ steps.build.outcome }}" == "failure" ] && cat build-output.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Logytics Analysis
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure'
        uses: logytics/action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          logs: ${{ env.FAILED_LOGS }}

      - name: Fail if any step failed
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
