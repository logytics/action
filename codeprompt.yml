# Project: BuildLens

Build an open-source GitHub Action called **BuildLens**.

## Goal

When a GitHub Actions workflow fails, BuildLens automatically collects logs from failed steps, sends them to an AI model, and generates a concise, developer-friendly explanation directly in the GitHub Actions **Build Summary**.

The goal is to eliminate the need for developers to read long CI logs.

---

# Core Principles

* Zero UI
* Zero database
* Zero accounts
* Single-line installation
* Open-source
* Lightweight and fast
* Designed for future SaaS extension (but NOT now)

---

# Example Usage

```yaml id="c1a9k2"
- uses: buildlens/action@v1
  if: failure()
  with:
    openai-api-key: ${{ secrets.OPENAI_API_KEY }}
```

---

# Behavior Example

A step fails:

```yaml id="d92kq1"
- run: npm test
```

Logs:

```id="x91mqo"
Error: Cannot find module 'redis'
```

BuildLens output in GitHub Actions Summary:

# BuildLens Summary

## Root Cause

Missing dependency: `redis`

## Key Error

Cannot find module 'redis'

## Suggested Fix

```bash id="k21p0z"
npm install redis
```

## Explanation

The code is importing the Redis package, but it is not installed in the environment.

## Confidence

92%

