# Technical Requirements

## Platform

* Node.js 20+
* JavaScript (NOT TypeScript)
* GitHub Actions Toolkit (`@actions/core`, `@actions/github`)
* OpenAI API (default model: gpt-4o-mini)

---

# Features

## 1. Detect Failure

Only run when previous step fails:

```yaml id="f91l2k"
if: failure()
```

---

## 2. Collect Logs

Extract logs from failed steps in the workflow run.

Use GitHub Actions context + API if needed.

Focus only on failed jobs/steps.

---

## 3. Log Cleaning

Before sending to AI:

Remove:

* ANSI color codes
* Repeated lines
* Progress bars
* Debug noise
* Build system noise

Keep:

* Stack traces
* Error messages
* File paths
* Relevant warnings

---

## 4. AI Prompt Format

Send cleaned logs to the model and request STRICT JSON output:

```json id="p92k1a"
{
  "rootCause": "",
  "keyError": "",
  "explanation": "",
  "suggestedFix": "",
  "confidence": 0
}
```

Rules:

* Keep output short and practical
* No long explanations
* No markdown inside JSON
* Confidence must be 0–100 integer

---

## 5. GitHub Actions Summary Output

Write formatted markdown using:

```js id="z91kq0"
core.summary
```

Sections:

* Root Cause
* Key Error
* Explanation
* Suggested Fix
* Confidence

Make it clean, readable, and developer-friendly.

---

# Architecture

```text id="a82kq9"
GitHub Action
   ↓
Detect failure (if: failure())
   ↓
Collect logs
   ↓
Clean logs
   ↓
Send to OpenAI
   ↓
Parse JSON response
   ↓
Render Markdown summary
   ↓
Write to GitHub Actions Summary
```

