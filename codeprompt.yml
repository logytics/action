# Implementation Details

## index.js

Main entry point:

* Detect failure context
* Trigger log collection
* Call AI pipeline
* Write summary

---

## aiClient.js

* Calls OpenAI API using fetch or axios
* Handles retries
* Parses JSON safely

---

## logCleaner.js

* Strip ANSI codes
* Remove noise lines
* Limit token size (important for cost control)

---

## summaryWriter.js

Uses:

```js id="c81mq2"
core.summary.addRaw()
core.summary.write()
```

